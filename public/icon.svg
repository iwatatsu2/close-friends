<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="50%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Moon -->
  <circle cx="256" cy="170" r="65" fill="#fbbf24" opacity="0.9"/>
  <circle cx="285" cy="155" r="55" fill="url(#bg)"/>
  <!-- Controller -->
  <g transform="translate(256,340)" fill="none" stroke="#a5b4fc" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-90" y="-40" width="180" height="80" rx="40" fill="#3730a3" stroke="#6366f1"/>
    <!-- D-pad -->
    <line x1="-50" y1="-15" x2="-50" y2="15"/>
    <line x1="-65" y1="0" x2="-35" y2="0"/>
    <!-- Buttons -->
    <circle cx="40" cy="-12" r="8" fill="#818cf8"/>
    <circle cx="60" cy="0" r="8" fill="#c084fc"/>
    <!-- Joysticks -->
    <circle cx="-30" cy="20" r="10" fill="#4f46e5" stroke="#818cf8" stroke-width="3"/>
    <circle cx="30" cy="20" r="10" fill="#4f46e5" stroke="#818cf8" stroke-width="3"/>
  </g>
  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="52" fill="#e0e7ff" letter-spacing="3">YORUBASE</text>
</svg>
